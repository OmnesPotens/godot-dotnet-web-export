name: Set Up Web Export Template Dependencies
description: |
  Sets up dependencies for building Godot web export templates (platform=web).
  Installs wasm-tools, Emscripten SDK, copies mono glue from an editor artifact,
  and builds the managed .NET assemblies needed for module_mono_enabled=yes web builds.

inputs:
  editor-artifact-name:
    description: Name of the editor artifact containing the mono glue directory and version metadata.
    required: true
  godot_source_dir:
    description: Path to the Godot source root (where modules/mono lives).
    required: false
    default: godot-src
  nuget_output_dir:
    description: Directory to push local NuGet packages into.
    required: false
    default: godot-src/bin/nuget

runs:
  using: composite

  steps:
    - name: Set Up WASM Tools
      shell: bash
      run: |
        # Install wasm-tools for both the pinned SDK version (global.json) and the system SDK.
        # The dual install ensures wasm-tools is available regardless of which SDK is active.
        if [[ -f global.json ]]; then
          mv global.json global.json.disabled
        fi
        dotnet workload install wasm-tools

        if [[ -f global.json.disabled ]]; then
          mv global.json.disabled global.json
          dotnet workload install wasm-tools
        fi

    - name: Set Up Emscripten SDK
      uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 #v16

    - name: Set Up SCons (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -y scons

    - name: Set Up SCons (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install scons

    - name: Set Up SCons (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons

    - name: Download Editor Artifact (glue + version)
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      with:
        name: ${{ inputs.editor-artifact-name }}
        path: ${{ inputs.godot_source_dir }}/bin

    - name: Copy Mono Glue
      shell: bash
      run: |
        cp -rf "${{ inputs.godot_source_dir }}/bin/glue/." \
               "${{ inputs.godot_source_dir }}/modules/mono/glue"

    - name: Build Mono Assemblies
      shell: bash
      run: |
        python "${{ inputs.godot_source_dir }}/modules/mono/build_scripts/build_assemblies.py" \
          --godot-output-dir="${{ inputs.godot_source_dir }}/bin" \
          --push-nupkgs-local "${{ inputs.nuget_output_dir }}"
